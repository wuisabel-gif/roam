<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The College Playbook — Campus Walk</title>
<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --panel:#262b3b; --panel2:#2f3548; --edge:#454d66; --edge-dark:#161a26;
    --ink:#eef2fb; --mut:#a7b0c8;
  }
  *{box-sizing:border-box;font-family:'Montserrat',system-ui,sans-serif}
  html,body{margin:0;height:100%;background:#bcd6f0;overflow:hidden}

  /* ---- Roblox-style HUD chip (top-left) ---- */
  #hud{position:fixed;top:16px;left:16px;z-index:9;
    background:var(--panel);border:2px solid var(--edge);
    border-radius:16px;box-shadow:0 6px 0 var(--edge-dark),0 16px 34px rgba(0,0,0,.4);
    padding:13px 15px;max-width:340px;color:var(--ink)}
  #hud .title{font-weight:800;font-size:15px;letter-spacing:.2px;display:flex;align-items:center;gap:8px}
  #hud .title .dot{width:12px;height:12px;border-radius:4px;background:#ffd54a;box-shadow:0 2px 0 #b9942a}
  #hud .sub{color:var(--mut);font-weight:600;font-size:12px;margin-top:3px}
  #hud .keys{display:flex;flex-wrap:wrap;gap:7px;margin-top:11px}
  .key{display:inline-flex;align-items:center;gap:6px;background:var(--panel2);
    border:1px solid var(--edge);border-bottom:3px solid var(--edge-dark);
    border-radius:9px;padding:5px 9px;font-weight:700;font-size:11.5px;color:var(--ink)}
  .key b{color:#9fc2ff}
  #hud .legend{display:flex;flex-wrap:wrap;gap:6px 10px;margin-top:11px}
  #hud .legend span{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:var(--mut)}
  #hud .legend i{width:11px;height:11px;border-radius:4px;box-shadow:0 1px 0 rgba(0,0,0,.4)}
  #hud .close{position:absolute;top:-9px;right:-9px;width:26px;height:26px;border:none;cursor:pointer;
    border-radius:50%;background:#ff5b6e;border-bottom:3px solid #b83145;color:#fff;font-weight:800;font-size:15px;line-height:1}

  /* ---- Roblox-style info card (opens on sign click) ---- */
  #card{position:fixed;left:0;right:0;bottom:0;z-index:20;display:none;justify-content:center;
    pointer-events:none;padding:0 14px 18px}
  #card.show{display:flex;animation:slideup .28s cubic-bezier(.2,1.2,.4,1)}
  @keyframes slideup{from{transform:translateY(34px);opacity:0}to{transform:translateY(0);opacity:1}}
  .card-box{pointer-events:auto;position:relative;width:min(600px,96vw);background:var(--panel);
    border:3px solid var(--edge);border-radius:20px;
    box-shadow:0 8px 0 var(--edge-dark),0 22px 50px rgba(0,0,0,.5);overflow:hidden;color:var(--ink)}
  .card-top{padding:16px 20px 14px;position:relative}
  .card-top::before{content:"";position:absolute;top:0;left:0;right:0;height:7px;background:var(--accent)}
  .card-badge{display:inline-block;font-weight:800;font-size:13px;color:#0e1320;background:var(--accent);
    padding:3px 11px;border-radius:9px;border-bottom:3px solid rgba(0,0,0,.28)}
  .card-cat{font-weight:700;font-size:11px;letter-spacing:1.5px;color:var(--accent);margin-left:9px}
  .card-title{font-weight:800;font-size:24px;line-height:1.12;margin:11px 0 4px}
  .card-tag{color:var(--mut);font-weight:600;font-size:14px;margin:0}
  .card-body{padding:4px 20px 18px}
  .moves{display:flex;flex-direction:column;gap:8px;margin:14px 0 0}
  .move{display:flex;gap:10px;align-items:flex-start;background:var(--panel2);
    border:1px solid var(--edge);border-bottom:3px solid var(--edge-dark);border-radius:11px;
    padding:9px 12px;font-weight:600;font-size:13.5px;line-height:1.35}
  .move i{flex:none;width:8px;height:8px;border-radius:3px;background:var(--accent);margin-top:6px;box-shadow:0 1px 0 rgba(0,0,0,.4)}
  .quote{margin:14px 0 2px;padding:11px 14px;background:rgba(255,255,255,.05);
    border-left:4px solid var(--accent);border-radius:8px;font-style:italic;font-weight:600;color:#dfe6f5;font-size:14px}
  .card-actions{display:flex;gap:10px;padding:0 20px 20px}
  .btn{flex:1;cursor:pointer;border:none;border-radius:12px;padding:11px;font-weight:800;font-size:14px;color:#fff;
    border-bottom:4px solid rgba(0,0,0,.32);transition:transform .06s}
  .btn:active{transform:translateY(2px);border-bottom-width:2px}
  .btn.prev{background:#39415a;border-bottom-color:#20263a}
  .btn.next{background:#3aa856;border-bottom-color:#247a3b}
  .card-close{position:absolute;top:-12px;right:-12px;width:34px;height:34px;border:none;cursor:pointer;
    border-radius:50%;background:#ff5b6e;border-bottom:4px solid #b83145;color:#fff;font-weight:800;font-size:19px;
    box-shadow:0 6px 16px rgba(0,0,0,.4)}
</style>
</head>
<body>
<div id="hud">
  <button class="close" onclick="document.getElementById('hud').style.display='none'">×</button>
  <div class="title"><span class="dot"></span>The College Playbook</div>
  <div class="sub">Walk up to a signboard — it expands and teaches you that strategy.</div>
  <div class="keys">
    <span class="key"><b>drag</b> look</span>
    <span class="key"><b>W A S D</b> walk</span>
    <span class="key"><b>shift</b> run</span>
    <span class="key"><b>walk up</b> to learn</span>
  </div>
  <div class="legend" id="legend"></div>
</div>

<div id="card">
  <div class="card-box" style="position:relative">
    <button class="card-close" id="card-close">×</button>
    <div class="card-top">
      <span class="card-badge" id="card-num">01</span><span class="card-cat" id="card-cat">CATEGORY</span>
      <h2 class="card-title" id="card-title">Title</h2>
      <p class="card-tag" id="card-tag">tagline</p>
    </div>
    <div class="card-body">
      <div class="moves" id="card-moves"></div>
      <div class="quote" id="card-quote">"quote"</div>
    </div>
  </div>
</div>

<script>
window.STRATEGIES=[{"n": 1, "cat": "acad", "title": "Don't do all of your reading", "tagline": "Read for the argument. Not for completion.", "moves": ["Read the intro and conclusion slow. Skim the rest, ticking the sentences that carry the argument.", "Lecture notes are your source of truth. The textbook is backup.", "Own your Sundays. A sharp morning sets the whole week.", "Drop a bad course in week one. Bad courses are kryptonite."], "quote": "If you take control of your Sunday, you take control of your week."}, {"n": 2, "cat": "habit", "title": "Make your bed", "tagline": "Clear room. Clear mind.", "moves": ["Make the bed. Clear the floor. Trash out. Every day, on autopilot.", "Roommate's a mess? Keep your half spotless anyway.", "Apply for scholarships every year. Most go unclaimed because nobody bothers.", "Build a study system with checklists. Then the material never feels like a wall."], "quote": "A clean room creates a focused mind; a messy room, a distracted one."}, {"n": 3, "cat": "mind", "title": "Read a newspaper every day", "tagline": "Give your brain a daily workout.", "moves": ["Read a serious paper every day. It sharpens you and widens your view.", "Get good at one thing. Real skill builds quiet confidence.", "Don't rent your self-worth from other people's approval. Own it.", "Plan in time blocks, not to-do lists. College days are too jagged for lists."], "quote": "Reading a newspaper is a daily workout for the brain."}, {"n": 4, "cat": "career", "title": "Sign up for something your first week", "tagline": "Get in before the awkwardness hardens.", "moves": ["Join a club, team, or paper in week one. Beat the isolation.", "Think bigger. Design one Grand Project worth years of your time.", "Take classes outside your major. Build real range.", "Pick one class a semester and truly excel in it."], "quote": "Your first week is the best time to get involved."}, {"n": 5, "cat": "career", "title": "Jump into research as soon as possible", "tagline": "Research is where the action is.", "moves": ["Email a professor about one specific thing. Enthusiasm beats credentials.", "Start humble. Be useful, nail the small tasks, then earn more.", "Research isn't only for scientists. Every field has open questions.", "Work in 50-minute sprints. Take the ten."], "quote": "Research is where all the action is."}, {"n": 6, "cat": "habit", "title": "Decorate your room", "tagline": "Build a room that sounds like you.", "moves": ["Skip the generic posters. Hang what you actually love.", "Good light. A chair you'd sit in. Comfort changes everything.", "Start exam prep two weeks out, in small daily chunks. Never the all-nighter.", "Treat writing as a core skill. Practice it on purpose."], "quote": "Make a space that's both comfortable and inspiring."}, {"n": 7, "cat": "acad", "title": "Take hard courses early on", "tagline": "Don't hide in the minor leagues.", "moves": ["Cap intro courses at half your schedule. The advanced ones teach more.", "Study in the library. The dorm is where focus goes to die.", "Learn it solo first. Lean on the study group only after.", "Join an honors program. Smaller rooms, sharper people."], "quote": "Why spend college in the minor leagues?"}, {"n": 8, "cat": "well", "title": "Attend guest lectures", "tagline": "Go to get set on fire.", "moves": ["Hit two guest lectures a month. They relight your curiosity.", "Make exercise non-negotiable. Same time, decided once.", "Call your home friends monthly. Voice, not text.", "Add a major or minor. It rarely adds course load."], "quote": "You go to ignite some passion within yourself."}, {"n": 9, "cat": "career", "title": "Don't get a normal job", "tagline": "Take work that pays you twice.", "moves": ["Pick an academic or quiet desk job you can study during.", "Write short papers over three days. Draft, edit, polish. Never in one sitting.", "Learn your real sleep need. Then hold the schedule.", "The hour before an exam? Relax, don't cram."], "quote": "Don't spend your hours on a job that drains your studies."}, {"n": 10, "cat": "well", "title": "Don't binge drink", "tagline": "Protect the edge you came for.", "moves": ["Drink if you want. Just don't binge.", "Stop comparing grades. They're not measuring the same thing.", "Set big goals. Then go find the people already there.", "Listen more than you talk. Synthesize before you speak."], "quote": "You can drink and still win. You just can't binge and win."}, {"n": 11, "cat": "well", "title": "Laugh every day", "tagline": "Stress is the enemy. Laughter is the cure.", "moves": ["Get one real laugh every day. Friends, comedy, whatever lands.", "Buy supplies that kill friction. Spend the focus on thinking, not hunting.", "Keep a work-progress journal. Planned versus done, honestly.", "Schedule fun on purpose. A packed term erases it otherwise."], "quote": "Life is short, and the benefits of laughter are enormous."}, {"n": 12, "cat": "career", "title": "Get involved with your major department", "tagline": "Your department is a network in disguise.", "moves": ["Treat the department like a company you want to be known inside.", "Show up to one department event a month. Bring a real question.", "Chase understanding, not GPA. Bombed an exam? Learn from it and move.", "Lecture attendance is non-negotiable."], "quote": "Don't avoid them. Get involved with your major department."}, {"n": 13, "cat": "mind", "title": "Volunteer quietly", "tagline": "Give without an audience.", "moves": ["Volunteer without seeking credit. The quiet of it builds real self-worth.", "Write with style. Pull the reader in, don't just inform them.", "Engage with real issues. It sharpens your sense of purpose.", "Plan summer early. For growth, not just rest."], "quote": "Volunteer quietly. It strengthens your sense of self-worth."}, {"n": 14, "cat": "habit", "title": "Don't take breaks between classes", "tagline": "Guard your momentum.", "moves": ["Use the gaps for small tasks or errands. Don't drift back to the dorm to rest.", "Try antinetworking. Real curiosity about people, no hidden agenda.", "Write one op-ed a semester for the student paper.", "Get organized. Then the work flows instead of stalling."], "quote": "Don't take breaks between classes."}, {"n": 15, "cat": "acad", "title": "Study with the quiz-and-recall method", "tagline": "Test yourself. Don't reread.", "moves": ["Review once, silent, noting the questions the material should answer.", "Then quiz yourself out loud, in full sentences, until you ace it cold.", "Add emotion and movement. Pace, stand, react. It locks memory in.", "Keep your inbox and files clean. Less background stress."], "quote": "Your goal is to ace the quiz without ever peeking."}, {"n": 16, "cat": "mind", "title": "Don't have no regrets", "tagline": "Win for the right reasons.", "moves": ["Chase experiences over trophies. That's where the fulfillment lives.", "Treat a failure as gratitude for the swing, not regret for the miss.", "Be ambitious for your own sake. Not for the applause.", "Find the adventure in the work itself."], "quote": "Don't have no regrets."}];
window.CATS={"mind": {"label": "Mindset", "color": "#7fb8e6"}, "acad": {"label": "Academics", "color": "#e3ad52"}, "career": {"label": "Career", "color": "#e58a63"}, "well": {"label": "Wellbeing", "color": "#5fc98a"}, "habit": {"label": "Habits", "color": "#c294dd"}};

(function(){var L=document.getElementById('legend'),C=window.CATS;
  Object.keys(C).forEach(function(k){var s=document.createElement('span');
    s.innerHTML='<i style="background:'+C[k].color+'"></i>'+C[k].label;L.appendChild(s);});})();

/* ---- Roblox-style info card logic ---- */
(function(){
  var S=window.STRATEGIES,C=window.CATS,cur=0;
  var card=document.getElementById('card');
  function render(){
    var s=S[cur],col=C[s.cat].color;
    document.querySelector('.card-box').style.setProperty('--accent',col);
    document.getElementById('card-num').textContent=(s.n<10?'0':'')+s.n;
    document.getElementById('card-cat').textContent=C[s.cat].label.toUpperCase();
    document.getElementById('card-title').textContent=s.title;
    document.getElementById('card-tag').textContent=s.tagline;
    var mv=document.getElementById('card-moves'); mv.innerHTML='';
    s.moves.forEach(function(m){var d=document.createElement('div');d.className='move';
      d.innerHTML='<i></i><span>'+m+'</span>';mv.appendChild(d);});
    document.getElementById('card-quote').textContent='\u201C'+s.quote+'\u201D';
  }
  window.openCard=function(s){ cur=S.indexOf(s); render(); card.classList.add('show'); };
  window.closeCard=function(){ card.classList.remove('show'); };
  function close(){ window.closeCard(); }
  document.getElementById('card-close').onclick=close;
  card.onclick=function(e){ if(e.target===card) close(); };
  document.addEventListener('keydown',function(e){ if(e.key==='Escape') close(); });
})();

AFRAME.registerComponent('campus',{
  init:function(){
    var self=this, S=window.STRATEGIES, C=window.CATS, root=this.el;
    this.focused=null;
    function esc(t){return String(t).replace(/"/g,'&quot;');}
    function pad(n){return (n<10?'0':'')+n;}

    var tcol=['#4f7a3a','#5c8a44','#6f9a52','#477036'];
    for(var z=4; z>=-92; z-=8){
      [-5.6,5.6].forEach(function(x){
        var t=document.createElement('a-entity');
        var xx=(x+(Math.random()*0.8-0.4)).toFixed(2);
        t.setAttribute('position', xx+' 0 '+(z+(Math.random()*3-1.5)).toFixed(2));
        var c1=tcol[Math.floor(Math.random()*tcol.length)], c2=tcol[Math.floor(Math.random()*tcol.length)];
        var hgt=(1.4+Math.random()*0.5).toFixed(2);
        var H0=parseFloat(hgt);
        t.innerHTML=
          '<a-cylinder radius="0.17" height="'+hgt+'" position="0 '+(hgt/2)+' 0" material="color:#7a5a38; roughness:1" shadow="cast: true"></a-cylinder>'+
          '<a-sphere radius="'+(1.15+Math.random()*0.3).toFixed(2)+'" position="0 '+(H0+1.0).toFixed(2)+' 0" material="color:'+c1+'; roughness:1" shadow="cast: true"></a-sphere>'+
          '<a-sphere radius="'+(0.9+Math.random()*0.25).toFixed(2)+'" position="0.55 '+(H0+1.5).toFixed(2)+' 0.15" material="color:'+c2+'; roughness:1" shadow="cast: true"></a-sphere>'+
          '<a-sphere radius="'+(0.85+Math.random()*0.25).toFixed(2)+'" position="-0.55 '+(H0+1.4).toFixed(2)+' -0.15" material="color:'+c1+'; roughness:1"></a-sphere>'+
          '<a-sphere radius="'+(0.7+Math.random()*0.2).toFixed(2)+'" position="0.05 '+(H0+2.05).toFixed(2)+' 0.1" material="color:'+c2+'; roughness:1"></a-sphere>';
        root.appendChild(t);
      });
    }

    function building(x,z,w,h,d,tx,roof){
      var e=document.createElement('a-entity'); e.setAttribute('position',x+' 0 '+z);
      e.innerHTML=
        '<a-box position="0 0.4 0" width="'+(w+0.3)+'" height="0.8" depth="'+(d+0.3)+'" material="color:#8d8678; roughness:1" shadow="cast: true; receive: true"></a-box>'+
        '<a-box position="0 '+(h/2+0.4)+' 0" width="'+w+'" height="'+h+'" depth="'+d+'" material="src: '+tx+'; repeat: '+Math.round(w/3.2)+' '+Math.round(h/3.2)+'; roughness: 1" shadow="cast: true; receive: true"></a-box>'+
        '<a-box position="0 '+(h+0.7)+' 0" width="'+(w+0.5)+'" height="0.5" depth="'+(d+0.5)+'" material="color:'+roof+'; roughness:1" shadow="cast: true"></a-box>';
      root.appendChild(e);
    }
    building(-12,-16,10,9,11,'#tex-facade1','#5b3a36');
    building(-13,-52,11,12,12,'#tex-facade2','#454b59');
    building(12,-11,10,8,11,'#tex-facade2','#454b59');
    building(13,-44,11,11,12,'#tex-facade1','#5b3a36');
    building(12,-74,10,10,11,'#tex-facade1','#5b3a36');
    building(-12,-80,10,9,11,'#tex-facade2','#454b59');

    // lampposts with warm lanterns
    for(var lz=-2; lz>=-90; lz-=15){
      [-2.55,2.55].forEach(function(lx){
        var lp=document.createElement('a-entity'); lp.setAttribute('position', lx+' 0 '+lz);
        lp.innerHTML=
          '<a-cylinder radius="0.07" height="3.2" position="0 1.6 0" material="color:#2b2f37; roughness:1" shadow="cast: true"></a-cylinder>'+
          '<a-sphere radius="0.16" position="0 3.25 0" material="shader: flat; color:#ffe6a4"></a-sphere>'+
          '<a-sphere radius="0.36" position="0 3.25 0" material="shader: flat; color:#ffe6a4; transparent: true; opacity: 0.22"></a-sphere>';
        root.appendChild(lp);
      });
    }

    // scattered bushes on the lawn
    for(var bi=0; bi<26; bi++){
      var bx=(Math.random()<0.5?-1:1)*(4.5+Math.random()*4.5), bz=4-Math.random()*96;
      var bu=document.createElement('a-entity'); bu.setAttribute('position', bx.toFixed(2)+' 0 '+bz.toFixed(2));
      var bc=['#3f6e36','#4a7a3e','#386632'][Math.floor(Math.random()*3)];
      bu.innerHTML='<a-sphere radius="'+(0.5+Math.random()*0.35).toFixed(2)+'" position="0 0.35 0" material="color:'+bc+'; roughness:1" shadow="cast: true"></a-sphere>';
      root.appendChild(bu);
    }

    // clock tower landmark at the end of the quad
    var tw=document.createElement('a-entity'); tw.setAttribute('position','0 0 -100');
    tw.innerHTML=
      '<a-box position="0 6 0" width="4.2" height="12" depth="4.2" material="src:#tex-facade1; repeat:1 4; roughness:1" shadow="cast: true; receive: true"></a-box>'+
      '<a-box position="0 12.3 0" width="4.8" height="0.7" depth="4.8" material="color:#5b3a36; roughness:1" shadow="cast: true"></a-box>'+
      '<a-cone position="0 14.4 0" radius-bottom="3.6" radius-top="0" height="3.6" material="color:#46342f; roughness:1" shadow="cast: true"></a-cone>'+
      '<a-circle position="0 9.6 2.13" radius="1.15" material="shader: flat; color:#f5f0e2"></a-circle>'+
      '<a-ring position="0 9.6 2.14" radius-inner="1.05" radius-outer="1.25" material="shader: flat; color:#3a342b"></a-ring>'+
      '<a-box position="0 9.85 2.16" width="0.07" height="0.6" depth="0.02" material="shader: flat; color:#2c2c2c"></a-box>'+
      '<a-box position="0.26 9.6 2.16" width="0.5" height="0.07" depth="0.02" rotation="0 0 -12" material="shader: flat; color:#2c2c2c"></a-box>';
    root.appendChild(tw);

    S.forEach(function(s,i){
      var z=2 - i*5.6;
      var x=(i%2===0)?-3.1:3.1;
      var col=C[s.cat].color;
      var g=document.createElement('a-entity');
      g.setAttribute('position', x+' 0 '+z.toFixed(2));
      g.setAttribute('rotation','0 '+(i%2===0?14:-14)+' 0');
      g.innerHTML=
        '<a-box width="0.09" depth="0.09" height="1.5" position="-0.78 0.75 0" material="color:#6f5740; roughness:1" shadow="cast: true"></a-box>'+
        '<a-box width="0.09" depth="0.09" height="1.5" position="0.78 0.75 0" material="color:#6f5740; roughness:1" shadow="cast: true"></a-box>';
      var panel=document.createElement('a-entity');
      panel.setAttribute('position','0 1.78 0.06');
      panel.classList.add('clickable');
      panel.innerHTML=
        '<a-plane src="#tex-sign" width="1.95" height="1.18" material="shader: flat; transparent: true; side: double" shadow="cast: true"></a-plane>'+
        '<a-plane width="1.95" height="0.1" position="0 0.6 0.01" material="shader: flat; color: '+col+'"></a-plane>'+
        '<a-text value="'+pad(s.n)+'" position="-0.82 0.40 0.02" width="1.0" wrap-count="6" color="#3a4048"></a-text>'+
        '<a-text value="'+esc(s.title)+'" position="-0.82 0.20 0.02" width="1.66" align="left" baseline="top" wrap-count="19" color="#23272e"></a-text>'+
        '<a-text value="'+esc(s.tagline)+'" position="-0.82 -0.34 0.02" width="1.5" align="left" baseline="top" wrap-count="34" color="#5a6068"></a-text>';
      panel.addEventListener('click',function(){ window.openCard(s); });
      g.appendChild(panel);
      root.appendChild(g);
      (window.SIGNS=window.SIGNS||[]).push({x:x,z:z,s:s,panel:panel});
    });

    var sc=this.el.sceneEl;
    setTimeout(function(){var r=sc.components.raycaster; if(r) r.refreshObjects();},700);
  }
});

AFRAME.registerComponent('thirdperson',{
  init:function(){
    var self=this;
    this.keys={}; this.yaw=0; this.pitch=-9; this.phase=0; this.amp=0; this.active=-1;
    var q=function(s){return self.el.querySelector(s).object3D;};
    this.legL=q('.legL'); this.legR=q('.legR'); this.armL=q('.armL'); this.armR=q('.armR');
    this.avatar=q('#avatar'); this.cam=q('#cam');
    this.UP=new THREE.Vector3(0,1,0);
    window.addEventListener('keydown',function(e){ self.keys[e.code]=true; });
    window.addEventListener('keyup',function(e){ self.keys[e.code]=false; });
    var down=false,lx=0,ly=0;
    function start(x,y){down=true;lx=x;ly=y;}
    function move(x,y){ if(!down)return; self.yaw-=(x-lx)*0.28; self.pitch=Math.max(-32,Math.min(8,self.pitch-(y-ly)*0.2)); lx=x;ly=y; }
    function end(){down=false;}
    this.el.sceneEl.addEventListener('loaded',function(){
      var cv=self.el.sceneEl.canvas;
      cv.addEventListener('mousedown',function(e){start(e.clientX,e.clientY);});
      window.addEventListener('mousemove',function(e){move(e.clientX,e.clientY);});
      window.addEventListener('mouseup',end);
      cv.addEventListener('touchstart',function(e){var t=e.touches[0];start(t.clientX,t.clientY);},{passive:true});
      window.addEventListener('touchmove',function(e){var t=e.touches[0];move(t.clientX,t.clientY);},{passive:true});
      window.addEventListener('touchend',end);
    });
  },
  tick:function(t,dt){
    dt=Math.min(dt,50)/1000;
    var k=this.keys, d2r=THREE.MathUtils.degToRad;
    var fwd=0,str=0;
    if(k['KeyW']||k['ArrowUp'])fwd+=1;
    if(k['KeyS']||k['ArrowDown'])fwd-=1;
    if(k['KeyA']||k['ArrowLeft'])str-=1;
    if(k['KeyD']||k['ArrowRight'])str+=1;
    var run=k['ShiftLeft']||k['ShiftRight'];
    var moving=(fwd!==0||str!==0);
    var sp=(run?7.0:3.6);
    this.el.object3D.rotation.y=d2r(this.yaw);
    this.cam.rotation.x=d2r(this.pitch);
    if(moving){
      var v=new THREE.Vector3(str,0,-fwd); v.normalize();
      v.applyAxisAngle(this.UP, d2r(this.yaw));
      var p=this.el.object3D.position;
      p.x+=v.x*sp*dt; p.z+=v.z*sp*dt;
      p.x=Math.max(-7.5,Math.min(7.5,p.x)); p.z=Math.max(-96,Math.min(12,p.z));
      // turn the character to face the way it is actually moving
      var want=Math.atan2(-v.x,-v.z)-d2r(this.yaw);
      var cur=this.avatar.rotation.y, df=Math.atan2(Math.sin(want-cur),Math.cos(want-cur));
      this.avatar.rotation.y=cur+df*Math.min(1,dt*12);
    }
    // walk up to a sign -> expand it + teach the lesson
    var pos=this.el.object3D.position, SG=window.SIGNS||[];
    var near=-1, best=2.8*2.8;
    for(var i=0;i<SG.length;i++){ var ddx=pos.x-SG[i].x, ddz=pos.z-SG[i].z, dd=ddx*ddx+ddz*ddz; if(dd<best){best=dd;near=i;} }
    if(near!==this.active){
      if(this.active>=0 && SG[this.active]) SG[this.active].panel.setAttribute('animation__f','property: scale; to: 1 1 1; dur: 260; easing: easeOutQuad');
      this.active=near;
      if(near>=0){
        SG[near].panel.setAttribute('animation__f','property: scale; to: 1.55 1.55 1.55; dur: 320; easing: easeOutBack');
        window.openCard(SG[near].s);
      } else if(window.closeCard){ window.closeCard(); }
    }
    var target=moving?(run?0.9:0.58):0;
    this.amp+=(target-this.amp)*Math.min(1,dt*9);
    this.phase+=dt*(run?15:10)*(moving?1:0);
    var s=Math.sin(this.phase)*this.amp;
    this.legL.rotation.x=s; this.legR.rotation.x=-s;
    this.armL.rotation.x=-s; this.armR.rotation.x=s;
    this.avatar.position.y=Math.abs(Math.sin(this.phase))*0.06*(this.amp/0.58||0);
  }
});
</script>
